services:
  db:
    image: postgres:16-alpine
    network_mode: host
    environment:
      POSTGRES_USER: htgether
      POSTGRES_PASSWORD: htgether
      POSTGRES_DB: htgether
      PGPORT: "5436"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U htgether -p 5436"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    network_mode: host
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://htgether:htgether@localhost:5436/htgether?schema=public
    depends_on:
      db:
        condition: service_healthy

  studio:
    build: .
    command: npx prisma studio
    network_mode: host
    environment:
      DATABASE_URL: postgresql://htgether:htgether@localhost:5436/htgether?schema=public
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
